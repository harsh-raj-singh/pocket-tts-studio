<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Local text-to-speech generator powered by Pocket TTS. Paste text or provide a URL to generate natural-sounding audio.">
    <title>Pocket TTS Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Ambient background blobs -->
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </div>
                <div>
                    <h1>Pocket TTS Studio</h1>
                    <p class="subtitle">Local text-to-speech · CPU-powered · No cloud needed</p>
                </div>
            </div>
        </header>

        <!-- Main content -->
        <main class="main-content">
            <!-- Input mode tabs -->
            <div class="input-tabs" role="tablist">
                <button class="tab active" id="tab-text" role="tab" aria-selected="true" onclick="switchTab('text')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    Paste Text
                </button>
                <button class="tab" id="tab-url" role="tab" aria-selected="false" onclick="switchTab('url')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
                    From URL
                </button>
            </div>

            <!-- Text input panel -->
            <div class="input-panel" id="panel-text">
                <textarea id="text-input" placeholder="Paste or type your text here…&#10;&#10;Pocket TTS handles long texts by splitting them into sentences and generating audio for each chunk. The results are seamlessly concatenated into one file." rows="10"></textarea>
                <div class="char-count"><span id="char-count">0</span> characters</div>
            </div>

            <!-- URL input panel -->
            <div class="input-panel hidden" id="panel-url">
                <div class="url-input-wrap">
                    <svg class="url-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
                    <input type="url" id="url-input" placeholder="https://example.com/blog-post" />
                </div>
                <p class="url-hint">Enter a public URL. The app will extract the article text automatically.</p>
            </div>

            <!-- Voice selector + Generate button -->
            <div class="controls">
                <div class="voice-selector">
                    <label for="voice-select">Voice</label>
                    <div class="select-wrap">
                        <select id="voice-select">
                            <option value="alba" selected>Alba (default)</option>
                            <option value="marius">Marius</option>
                            <option value="javert">Javert</option>
                            <option value="jean">Jean</option>
                            <option value="fantine">Fantine</option>
                            <option value="cosette">Cosette</option>
                            <option value="eponine">Eponine</option>
                            <option value="azelma">Azelma</option>
                        </select>
                    </div>
                </div>

                <button class="generate-btn" id="generate-btn" onclick="generate()">
                    <span class="btn-content">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        Generate Audio
                    </span>
                    <span class="btn-loading hidden">
                        <div class="spinner"></div>
                        Generating…
                    </span>
                </button>
            </div>

            <!-- Status / Progress -->
            <div class="status-bar hidden" id="status-bar">
                <div class="status-icon">
                    <div class="pulse-ring"></div>
                    <div class="pulse-dot"></div>
                </div>
                <span id="status-text">Processing…</span>
            </div>

            <!-- Result -->
            <div class="result-card hidden" id="result-card">
                <div class="result-header">
                    <div class="result-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                    </div>
                    <div>
                        <h3>Audio Ready</h3>
                        <p class="result-meta" id="result-meta"></p>
                    </div>
                </div>
                <audio controls id="audio-player" class="audio-player"></audio>
                <div class="result-stats" id="result-stats"></div>
                <a id="download-btn" class="download-btn" download>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download WAV
                </a>
            </div>

            <!-- Error -->
            <div class="error-card hidden" id="error-card">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                <span id="error-text"></span>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Powered by <a href="https://github.com/kyutai-labs/pocket-tts" target="_blank" rel="noopener">Pocket TTS</a> by Kyutai Labs · Running locally on your machine</p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
